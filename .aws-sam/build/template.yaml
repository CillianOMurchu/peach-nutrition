AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Peach Nutrition Order Processor and Infrastructure
Globals:
  Function:
    Timeout: 5
    MemorySize: 128
Resources:
  OrderProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: OrderProcessingQueue
      VisibilityTimeout: 60
  OrderProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: OrderProcessorFunction
      Runtime: nodejs20.x
      Architectures:
      - x86_64
      MemorySize: 128
      Timeout: 10
      Policies:
      - SQSPollerPolicy:
          QueueName:
            Fn::GetAtt:
            - OrderProcessingQueue
            - QueueName
      - AWSLambdaBasicExecutionRole
      - arn:aws:iam::aws:policy/AmazonSESFullAccess
      Events:
        OrderProcessor:
          Type: SQS
          Properties:
            Queue:
              Fn::GetAtt:
              - OrderProcessingQueue
              - Arn
            BatchSize: 10
      Environment:
        Variables:
          QUEUE_URL:
            Ref: OrderProcessingQueue
    Metadata:
      SamResourceId: OrderProcessorFunction
Outputs:
  OrderProcessingQueueURL:
    Description: URL of the SQS Queue for the Order Processor
    Value:
      Ref: OrderProcessingQueue
  OrderProcessorFunctionArn:
    Description: ARN of the Order Processor Lambda Function
    Value:
      Fn::GetAtt:
      - OrderProcessorFunction
      - Arn
