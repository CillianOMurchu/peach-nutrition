AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Peach Nutrition Order Processor and Infrastructure

Globals:
  Function:
    Timeout: 5
    MemorySize: 128

Resources:
  # 1. Define the SQS Queue (The input source for the worker)
  OrderProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: OrderProcessingQueue
      VisibilityTimeout: 60 # Set to match the Lambda timeout to prevent immediate reprocessing

  # 2. Define the Lambda Function (The serverless worker to process the queue)
  OrderProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      CodeUri: build-order-processor/
      Runtime: nodejs20.x
      Architectures:
        - x86_64
      MemorySize: 128
      Timeout: 10

      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt OrderProcessingQueue.QueueName
        - AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AmazonSESFullAccess

      Events:
        OrderProcessor:
          Type: SQS
          Properties:
            Queue: !GetAtt OrderProcessingQueue.Arn
            BatchSize: 10 # Process up to 10 messages at once

      Environment:
        Variables:
          QUEUE_URL: !Ref OrderProcessingQueue

Outputs:
  OrderProcessingQueueURL:
    Description: "URL of the SQS Queue for the Order Processor"
    Value: !Ref OrderProcessingQueue

  OrderProcessorFunctionArn:
    Description: "ARN of the Order Processor Lambda Function"
    Value: !GetAtt OrderProcessorFunction.Arn
